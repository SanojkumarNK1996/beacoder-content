<h1>Start / End</h1>
<p>The Start and End symbols mark where the flowchart begins and where it finishes.</p>
<p>They are usually drawn as ovals or rounded rectangles.</p>
<h2>Usage</h2>
<ul>
  <li>Start: first step before any process begins.</li>
  <li>End: last step after all actions are complete.</li>
</ul>
