<h1>Flowchart Rules</h1>
<p>Good flowcharts follow standard rules so the logic is clear and the diagram is easy to follow.</p>
<h2>Common Rules</h2>
<ul>
  <li>Use one start and one end symbol</li>
  <li>Connect symbols with arrows only in one direction</li>
  <li>Keep labels clear and concise</li>
  <li>Avoid crossing lines when possible</li>
</ul>
