<h1>Connectors</h1>
<p>Connectors link different parts of a flowchart, especially when the diagram crosses pages or becomes complex.</p>
<p>They are often shown as small circles or labeled arrows.</p>
<h2>Use Case</h2>
<ul>
  <li>Move from one section of the flowchart to another</li>
  <li>Keep the chart clean and readable</li>
</ul>
