<h1>Asking Questions Properly</h1>
<p>Good questions are clear, specific, and provide enough context for others to help you effectively.</p>
<h2>How to Ask</h2>
<ul>
  <li>State what you are trying to do.</li>
  <li>Show what you have already tried.</li>
  <li>Include exact error messages or results.</li>
</ul>
