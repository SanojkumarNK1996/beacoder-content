<h1>Averages</h1>
<p>An average summarizes a set of numbers with a single representative value.</p>
<h2>Mean</h2>
<p>Mean = (Sum of values) / (Number of values)</p>
<h2>Example</h2>
<ul>
  <li>For values 10, 15, 20: mean = (10 + 15 + 20) / 3 = 15.</li>
</ul>
<h2>Use Cases</h2>
<ul>
  <li>Exam scores</li>
  <li>Survey data</li>
</ul>
