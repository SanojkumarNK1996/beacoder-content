<h1>Logical Puzzles</h1>
<p>Logical puzzles test reasoning by asking you to draw conclusions from information and constraints.</p>
<h2>Types</h2>
<ul>
  <li>Grid puzzles</li>
  <li>Sequence puzzles</li>
  <li>Comparison puzzles</li>
</ul>
<h2>Technique</h2>
<p>Read carefully, note key facts, and eliminate impossible options to reach the valid solution.</p>
